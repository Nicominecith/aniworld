<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniWorldNico</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Bebas+Neue&display=swap');

        :root {
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --bg-body: #020617;
            --bg-card: #0f172a;
            --bg-hover: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(15, 23, 42, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-body);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            line-height: 1.5;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* TOP AD BANNER */
        #topAdBanner {
            background: linear-gradient(90deg, #020617, #0a1628, #020617);
            border-bottom: 1px solid rgba(59,130,246,0.15);
            padding: 8px 24px; text-align: center; position: relative;
            font-size: 13px; color: var(--text-muted); overflow: hidden;
        }
        #topAdBanner::before {
            content:''; position:absolute; inset:0;
            background: linear-gradient(90deg, transparent, rgba(59,130,246,0.05), transparent);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
        #topAdBanner strong { color: var(--primary); }
        .banner-ad-label {
            font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
            color: var(--primary); margin-right: 8px; opacity: 0.6;
        }
        .banner-close {
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); cursor: pointer; font-size: 14px; z-index: 2;
        }
        .banner-close:hover { color: var(--text-main); }

        /* Navigation */
        nav {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
            padding: 0 24px;
        }
        .nav-content {
            max-width: 1400px; margin: 0 auto;
            height: 70px; display: flex; align-items: center; justify-content: space-between; gap: 20px;
        }
        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px; letter-spacing: 2px; color: #fff;
            text-decoration: none; display: flex; align-items: center; gap: 8px;
            cursor: pointer;
        }
        .logo span { color: var(--primary); text-shadow: 0 0 15px var(--primary-glow); }

        .search-bar { flex: 1; max-width: 500px; position: relative; }
        .search-bar input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 10px 16px 10px 42px; border-radius: 12px; color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.3s ease;
        }
        .search-bar input::placeholder { color: var(--text-muted); }
        .search-bar input:focus {
            outline: none; border-color: var(--primary); background: rgba(255,255,255,0.1);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        .search-bar i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .nav-right { display: flex; align-items: center; gap: 14px; }

        .lang-toggle {
            display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
        }
        .lang-btn {
            padding: 6px 13px; font-size: 12px; font-weight: 800;
            cursor: pointer; background: transparent; border: none;
            color: var(--text-muted); transition: 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .lang-btn.active { background: var(--primary); color: #fff; }
        .lang-btn:hover:not(.active) { color: var(--text-main); }

        .live-pill {
            font-size: 13px; font-weight: 800; color: var(--primary);
            display: flex; align-items: center; gap: 6px;
        }
        .live-dot { width: 7px; height: 7px; background: #ef4444; border-radius: 50%; animation: blink 2s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* Content */
        main { max-width: 1400px; margin: 0 auto; padding: 30px 24px; min-height: 80vh; }

        .hero-banner {
            background: linear-gradient(135deg, #1e293b 0%, #020617 100%);
            border: 1px solid var(--border); border-radius: 24px;
            padding: 60px; margin-bottom: 40px; position: relative; overflow: hidden;
        }
        .hero-banner::after {
            content: ''; position: absolute; top: 0; right: 0; width: 50%; height: 100%;
            background: radial-gradient(circle at center, var(--primary-glow) 0%, transparent 70%);
            opacity: 0.2; pointer-events: none;
        }
        .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: 64px; margin-bottom: 10px; line-height: 1; }
        .hero-title span { color: var(--primary); }
        .hero-subtitle { color: var(--text-muted); max-width: 600px; font-size: 18px; margin-bottom: 30px; }

        .stats-grid { display: flex; gap: 40px; }
        .stat-item .val { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--primary); }
        .stat-item .lab { font-size: 12px; text-transform: uppercase; color: var(--text-muted); font-weight: 700; }

        .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .section-title { font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 12px; }
        .section-title::before { content: ''; width: 4px; height: 24px; background: var(--primary); border-radius: 2px; }

        .filter-wrap { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 20px; }
        .filter-chip {
            padding: 8px 20px; border-radius: 30px; background: var(--bg-card);
            border: 1px solid var(--border); cursor: pointer; white-space: nowrap;
            font-size: 14px; font-weight: 600; color: var(--text-muted); transition: all 0.2s;
        }
        .filter-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .filter-chip:hover:not(.active) { border-color: var(--primary); color: var(--text-main); }

        /* Grid */
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 24px; }
        .anime-card {
            background: var(--bg-card); border-radius: 16px; overflow: hidden;
            border: 1px solid var(--border); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; position: relative;
        }
        .anime-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 12px 30px -10px rgba(0,0,0,0.5); }
        .card-img { position: relative; aspect-ratio: 2/3; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; display: block; }
        .anime-card:hover .card-img img { transform: scale(1.05); }
        .card-badge {
            position: absolute; top: 10px; right: 10px; background: var(--primary);
            font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 6px; z-index: 2;
        }
        .card-info { padding: 15px; }
        .card-name { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .card-meta { font-size: 12px; color: var(--text-muted); }

        /* Native ad card */
        .ad-native {
            background: linear-gradient(135deg, #070d1c, var(--bg-card));
            border-radius: 16px; border: 1px solid rgba(59,130,246,0.18);
            cursor: pointer; overflow: hidden; transition: all 0.3s; display: flex; flex-direction: column;
        }
        .ad-native:hover { border-color: var(--primary); transform: translateY(-4px); }
        .ad-native-img {
            aspect-ratio: 2/3; background: linear-gradient(135deg, #070d1c, #0d1b38);
            display: flex; align-items: center; justify-content: center; font-size: 42px;
        }
        .ad-native-body { padding: 15px; }
        .ad-native-label { font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--primary); margin-bottom: 5px; }
        .ad-native-text { font-weight: 700; font-size: 13px; color: var(--text-muted); line-height: 1.4; }

        /* Views */
        #detail-view, #player-view { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .back-link {
            display: inline-flex; align-items: center; gap: 8px; color: var(--text-muted);
            text-decoration: none; margin-bottom: 30px; font-weight: 600; cursor: pointer;
        }
        .back-link:hover { color: var(--primary); }

        .detail-layout { display: grid; grid-template-columns: 300px 1fr; gap: 50px; }
        .detail-cover img { width: 100%; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid var(--border); display: block; }

        /* Sidebar ad */
        .sidebar-ad {
            margin-top: 14px; background: linear-gradient(135deg, #070d1c, var(--bg-card));
            border: 1px solid rgba(59,130,246,0.15); border-radius: 14px;
            padding: 16px; text-align: center; cursor: pointer; transition: border-color 0.2s;
        }
        .sidebar-ad:hover { border-color: var(--primary); }
        .sidebar-ad-label { font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--primary); margin-bottom: 8px; }
        .sidebar-ad-text { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
        .sidebar-ad-btn {
            display: inline-block; margin-top: 10px; background: var(--primary); color: #fff;
            font-size: 11px; font-weight: 800; padding: 7px 16px; border-radius: 8px;
        }

        .title-area h1 { font-size: 48px; font-weight: 800; margin-bottom: 10px; line-height: 1.1; }
        .desc-text { color: var(--text-muted); font-size: 16px; margin-bottom: 30px; line-height: 1.6; max-width: 800px; }

        .season-tabs { display: flex; gap: 15px; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .season-tab {
            padding: 10px 20px; cursor: pointer; font-weight: 700; color: var(--text-muted);
            position: relative; transition: color 0.3s;
        }
        .season-tab.active { color: var(--primary); }
        .season-tab.active::after {
            content: ''; position: absolute; bottom: -11px; left: 0; width: 100%; height: 3px;
            background: var(--primary); border-radius: 3px 3px 0 0;
        }

        .episode-list { display: grid; gap: 10px; }
        .episode-card {
            background: var(--bg-card); padding: 15px 20px; border-radius: 12px;
            display: flex; align-items: center; gap: 20px; cursor: pointer;
            border: 1px solid var(--border); transition: 0.2s;
        }
        .episode-card:hover { background: var(--bg-hover); border-color: var(--primary); }
        .ep-idx { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--primary); width: 40px; }
        .ep-title { flex: 1; font-weight: 600; }

        /* Player */
        .video-box {
            background: #000; border-radius: 24px; overflow: hidden; aspect-ratio: 16/9;
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.7); border: 1px solid var(--border);
            margin-bottom: 25px; position: relative;
        }
        .video-box iframe { width: 100%; height: 100%; border: none; }

        .player-ctrls {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--bg-card); padding: 20px; border-radius: 16px; border: 1px solid var(--border);
            margin-bottom: 10px;
        }
        .btn-action {
            background: var(--bg-hover); border: 1px solid var(--border); color: #fff;
            padding: 10px 24px; border-radius: 10px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; gap: 10px; transition: 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .btn-action:hover:not(:disabled) { background: var(--primary); border-color: var(--primary); }
        .btn-action:disabled { opacity: 0.3; cursor: not-allowed; }

        .key-hint {
            text-align: center; font-size: 12px; color: var(--text-muted); margin-bottom: 20px;
        }
        .key-hint kbd {
            background: var(--bg-hover); border: 1px solid var(--border);
            padding: 2px 8px; border-radius: 5px; color: var(--text-main); font-size: 12px;
        }

        /* Player leaderboard ad */
        .player-ad {
            background: linear-gradient(90deg, #070d1c, #0a1628, #070d1c);
            border: 1px solid rgba(59,130,246,0.12); border-radius: 12px;
            padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: border-color 0.2s;
        }
        .player-ad:hover { border-color: var(--primary); }
        .player-ad-left { display: flex; align-items: center; gap: 14px; }
        .player-ad-icon { font-size: 24px; }
        .player-ad-label { font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--primary); }
        .player-ad-text { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
        .player-ad-btn {
            background: var(--primary); color: #fff;
            font
